services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: async-worker-dashboard
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/jobs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
